name: SmallOKR Multi-Service Build

on:
  workflow_dispatch:
    inputs:
      service_name:
        description: '选择要构建的服务'
        required: true
        default: 'userservice'
        type: choice
        options:
          - userservice
          - targetservice
          - todoservice
          - traceservice

jobs:
  build-service:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Service Image
        run: |
          SERVICE="${{ github.event.inputs.service_name }}"
          echo "=== 开始构建服务: $SERVICE ==="
          
          podman build \
            -t smallokr-${SERVICE}:latest \
            -f smallokr_server/docker/${SERVICE}.Dockerfile \
            smallokr_server/

     
