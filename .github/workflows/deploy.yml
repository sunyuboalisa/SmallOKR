name: SmallOKR Multi-Service Build (Windows)

on:
  workflow_dispatch:
    inputs:
      service_name:
        description: '选择要构建的服务'
        required: true
        default: 'userservice'
        type: choice
        options:
          - userservice
          - targetservice
          - todoservice
          - traceservice

jobs:
  build-service:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Service Image
        # 强制指定使用 PowerShell
        shell: pwsh
        run: |
          $SERVICE = "${{ github.event.inputs.service_name }}"
          Write-Host "=== 开始构建服务: $SERVICE ==="
          
          # 在 Windows 中，路径建议用双引号包裹，防止空格问题
          # 反引号 ` 是 PowerShell 的换行符
          podman build `
            -t "smallokr-${SERVICE}:latest" `
            -f "smallokr_server/docker/${SERVICE}.Dockerfile" `
            "smallokr_server/"
