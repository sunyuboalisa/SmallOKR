spring:
  data:
    redis:
      host: ${REDIS_HOST} # Redis服务器地址
      port: ${REDIS_PORT} # 默认端口
      password: ${REDIS_PASSWORD} # 如果有密码
      database: ${REDIS_DB} # 默认DB索引
      # lettuce:
      #   pool:
      #     max-active: 8      # 最大连接数
      #     max-idle: 4        # 最大空闲连接
      #     min-idle: 1        # 最小空闲连接
      #     max-wait: 2000ms   # 获取连接最大等待时间
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR}
        namespace: ${NACOS_NAMESPACE}
        username: ${NACOS_USERNAME}
        password: ${NACOS_PASSWORD}
  datasource:
    url: ${MYSQL_URL}
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    protocol: ${MAIL_PROTOCOL}
    properties:
      mail:
        smtp:
          auth: true
          starttls.enable: false
          ssl.enable: false
